<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3학년 교무실 호출 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; text-align: center; background-color: #f4f6f9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { background-color: #45a049; }
        /* 선생님 상태 표시 스타일 */
        #teacher-status-box { margin: 5px 0 15px; padding: 10px; border-radius: 6px; font-weight: bold; display: none; font-size: 15px; }
        .status-available { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .status-absent { background-color: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔔 3학년 교무실 호출</h2>
        
        <select id="grade">
            <option value="3">3학년</option>
        </select>
        
        <select id="classNum">
            <option value="">-- 반 선택 --</option>
            <script>for(let i=1; i<=10; i++) document.write(`<option value="${i}">${i}반</option>`);</script>
        </select>
        
        <input type="text" id="name" placeholder="이름을 입력하세요" autocomplete="off">
        
        <select id="teacher" onchange="checkTeacherStatus()">
            <option value="">-- 선생님 선택 --</option>
            <option value="김건우 선생님(국어)">김건우 선생님(국어)</option>
            <option value="김영민 선생님(사회)">김영민 선생님(사회)</option>
            <option value="강만규 선생님(물리)">강만규 선생님(물리)</option>
            <option value="노여진 선생님(국어)">노여진 선생님(국어)</option>
            <option value="박기만 선생님(사회)">박기만 선생님(사회)</option>
            <option value="이의진 선생님(체육)">이의진 선생님(체육)</option>
            <option value="이주영 선생님(화학)">이주영 선생님(화학)</option>
            <option value="이필권 선생님(미술)">이필권 선생님(미술)</option>
            <option value="채정태 선생님(수학)">채정태 선생님(수학)</option>
            <option value="최아현 선생님(지구)">최아현 선생님(지구)</option>
            <option value="홍지연 선생님(영어)">홍지연 선생님(영어)</option>
        </select>

        <div id="teacher-status-box"></div>
        
        <select id="purpose">
            <option value="">-- 방문 목적 --</option>
            <option value="핸드폰">핸드폰 관련</option>
            <option value="수행평가">수행평가</option>
            <option value="질문">질문</option>
            <option value="출결">출결 관련</option>
            <option value="기타">기타</option>
        </select>
        
        <button id="callBtn" onclick="submitCall()">호출하기</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw8BaJanpoGK2PVy4b8D-MYtWAYPkdXgMuiSCNuvJaHfuW02r0EBD2u2EpA34w4y9THfQ/exec";
        let teacherStatuses = {}; 
        let isCalling = false; // 중복 호출 방지용 변수 추가

        async function loadStatuses() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                teacherStatuses = data.statuses || {};
                checkTeacherStatus(); 
            } catch(e) { console.error("상태 로드 실패", e); }
        }

        function checkTeacherStatus() {
            const teacherSelect = document.getElementById('teacher');
            const statusBox = document.getElementById('teacher-status-box');
            const selectedTeacher = teacherSelect.value;

            if(!selectedTeacher) {
                statusBox.style.display = "none";
                return;
            }

            const status = teacherStatuses[selectedTeacher] || "자리에 계심"; 
            statusBox.style.display = "block";
            statusBox.className = ""; 

            if(status === "자리에 계심") {
                statusBox.innerText = `🟢 현재 해당 선생님은 [자리에 계심] 상태입니다.`;
                statusBox.classList.add('status-available');
            } else {
                statusBox.innerText = `🔴 현재 해당 선생님은 [자리에 안 계심(부재중)] 상태입니다.`;
                statusBox.classList.add('status-absent');
            }
        }

        async function submitCall() {
            // 1. 이미 호출 중이면 무시 (버튼 연타 방지)
            if (isCalling) return;

            const grade = document.getElementById('grade').value;
            const classNum = document.getElementById('classNum').value;
            const name = document.getElementById('name').value.trim();
            const teacher = document.getElementById('teacher').value;
            const purpose = document.getElementById('purpose').value;

            if(!classNum || !name || !teacher || !purpose) {
                alert("모든 항목을 입력/선택해주세요!");
                return;
            }

            // 2. 호출 시작: 상태 잠그고 버튼 텍스트 변경
            isCalling = true;
            const callBtn = document.getElementById('callBtn');
            callBtn.innerText = "호출 중...";
            callBtn.style.backgroundColor = "#999"; // 시각적으로 눌린 느낌 주기

            const data = { action: "call", grade, classNum, name, teacher, purpose };

            try {
                const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
                const result = await response.json();
                
                if(result.result === "success") {
                    alert("호출이 완료되었습니다.");
                    document.getElementById('name').value = "";
                    document.getElementById('classNum').selectedIndex = 0;
                    document.getElementById('teacher').selectedIndex = 0;
                    document.getElementById('purpose').selectedIndex = 0;
                    
                    // 🚨 에러 원인 수정 완료: 직접 id로 찾아서 숨김
                    document.getElementById('teacher-status-box').style.display = "none"; 
                } else {
                    alert("서버에서 오류가 발생했습니다.");
                }
            } catch(error) { 
                console.error(error); // 진짜 에러가 났을 때 F12에서 확인하기 위해
                alert("호출 실패! 네트워크를 확인해주세요."); 
            } finally {
                // 3. 호출이 끝나면(성공이든 실패든) 다시 원래대로 복구
                isCalling = false;
                callBtn.innerText = "호출하기";
                callBtn.style.backgroundColor = "#4CAF50";
            }
        }

        setInterval(loadStatuses, 3000);
        loadStatuses();
    </script>
</body>
</html>
